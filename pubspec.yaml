name: derech
description: "דרך — אפליקציית ניווט אופליין"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # מפה
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  # מסד הנתונים אופליין
  sqlite3: ^3.3.2

  # מיקום
  geolocator: ^14.0.2
  permission_handler: ^12.0.3

  # ניהול מצב
  provider: ^6.1.5

  # UI
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.8

  # כלי עזר
  path_provider: ^2.1.5
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
